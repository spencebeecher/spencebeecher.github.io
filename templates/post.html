<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ title }}</title>
    <style>
      * { box-sizing: border-box; }
      body { font-family: Helvetica, "Helvetica Neue", Arial, sans-serif; max-width: 800px; margin: 0 auto; padding: 0 1rem; color: #333; line-height: 1.7; }
      nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid #eee; margin-bottom: 2rem; }
      nav .logo { font-weight: bold; font-size: 1.2rem; text-decoration: none; color: #111; }
      nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 1.5rem; }
      nav a { text-decoration: none; color: #555; }
      nav a:hover { color: #000; }
      header h1 { margin-bottom: 0.25rem; }
      header .date { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
      article h2, article h3, article h4 { margin-top: 1.5rem; }
      article a { color: #0066cc; }
      article a:hover { text-decoration: none; }
      pre { background: #f7f7f8; padding: 1rem; overflow: auto; border-radius: 4px; }
      code { font-family: Menlo, Monaco, Consolas, monospace; font-size: 0.9em; }
      blockquote { border-left: 3px solid #ddd; margin-left: 0; padding-left: 1rem; color: #666; }
      footer { border-top: 1px solid #eee; margin-top: 3rem; padding: 1rem 0; color: #888; font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <nav>
      <a class="logo" href="/">Spencer Beecher</a>
      <ul>
        <li><a href="/">Blog</a></li>
        <li><a href="/misc.html">Misc</a></li>
        <li><a href="/about.html">About</a></li>
      </ul>
    </nav>

    <header>
      <h1>{{ title }}</h1>
      {% if date %}<p class="date">{{ date.strftime('%B %d, %Y') }}</p>{% endif %}
    </header>

    <article>
      {{ content | safe }}
    </article>

    <footer>
      <p>&copy; Spencer Beecher</p>
    </footer>
  </body>
</html>
